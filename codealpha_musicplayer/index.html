<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="player">

    <div class="player-header">
        <span class="header-title">Now Playing</span>
        <button id="playlist-toggle" title="Toggle Playlist">
            <i class="fa-solid fa-list"></i>
        </button>
    </div>

    <div class="album-art">
        <img id="cover" src="life of ram.jpg" alt="Album Cover">
    </div>

    <div class="song-info">
        <h2 id="title">Song Title</h2>
        <p id="artist">Artist Name</p>
    </div>

    <audio id="audio"></audio>

    <div class="progress-area">
        <input type="range" id="progress" value="0">
        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button id="prev"><i class="fa-solid fa-backward-step"></i></button>
        <button id="play" class="play-btn"><i class="fa-solid fa-play"></i></button>
        <button id="next"><i class="fa-solid fa-forward-step"></i></button>
    </div>

    <div class="volume-box">
        <i class="fa-solid fa-volume-high"></i>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
    </div>

    <div class="playlist-overlay" id="playlist-overlay">
        <div class="playlist-header">
            <h3>Playlist</h3>
            <button id="playlist-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul id="playlist"></ul>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
